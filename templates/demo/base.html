<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PF2 — Демо (только Flask)</title>
    <style>
        body { font-family: sans-serif; background: #f2ede6; color: #1a1a1a; margin: 0; }
        header { background: #6b1010; color: #fff; padding: .8rem 1.5rem; display: flex; align-items: center; justify-content: space-between; }
        header a { color: #c9a84c; text-decoration: none; font-weight: 700; font-size: 1.1rem; }
        header nav a { color: rgba(255,255,255,.85); text-decoration: none; margin-left: 1rem; font-size: .9rem; }
        .note { background: #fff3cd; border: 1px solid #ffc107; padding: .6rem 1rem; margin: 1rem auto; max-width: 900px; border-radius: 6px; font-size: .88rem; }
        main { max-width: 900px; margin: 0 auto; padding: 1.5rem 1rem 3rem; }
        h2 { color: #6b1010; border-bottom: 2px solid #c9a84c; padding-bottom: .3rem; margin-bottom: 1.2rem; }
        .card { background: #fff; border: 1px solid #ddd0c0; border-radius: 8px; padding: 1.2rem 1.4rem; margin-bottom: 1rem; }
        .card h3 { color: #6b1010; border-bottom: 1px solid #eee; padding-bottom: .3rem; margin-bottom: .9rem; font-size: 1rem; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: .8rem; margin-bottom: .5rem; }
        .grid-6 { display: grid; grid-template-columns: repeat(6, 1fr); gap: .8rem; }
        .grid-3 { display: grid; grid-template-columns: repeat(3, 1fr); gap: .8rem; }
        label { display: block; font-size: .82rem; font-weight: 600; color: #6b1010; margin-bottom: .25rem; }
        input, select, textarea { width: 100%; padding: .4rem .6rem; border: 1.5px solid #ddd0c0; border-radius: 5px; font-size: .88rem; box-sizing: border-box; }
        input:focus, select:focus { outline: none; border-color: #c9a84c; }
        .btn { display: inline-block; padding: .45rem 1.1rem; border-radius: 5px; border: none; cursor: pointer; font-size: .88rem; font-weight: 600; text-decoration: none; }
        .btn-red  { background: #8b1a1a; color: #fff; }
        .btn-grey { background: #6c757d; color: #fff; }
        .btn-sm { padding: .3rem .7rem; font-size: .8rem; }
        .hint { color: #888; font-size: .78rem; font-weight: 400; }
        .feats-table { width: 100%; border-collapse: collapse; font-size: .85rem; }
        .feats-table th { background: #6b1010; color: #fff; padding: .4rem .6rem; text-align: left; }
        .feats-table td { padding: .4rem .6rem; border-bottom: 1px solid #eee; }
        .feats-table input, .feats-table select { padding: .3rem .5rem; font-size: .82rem; }
        .actions { display: flex; gap: .5rem; margin-top: 1rem; }
        footer { text-align: center; padding: .7rem; background: #6b1010; color: rgba(255,255,255,.5); font-size: .8rem; }
    </style>
</head>
<body>
<header>
    <a href="/demo">⚔️ PF2e — Демо без JS</a>
    <nav>
        <a href="/">← Вернуться к основному сайту</a>
    </nav>
</header>

<div class="note">
    ⚠️ <strong>Это демо-версия только для сравнения.</strong>
    Здесь нет JavaScript — всё работает через чистый Flask.
    <a href="/">Основной сайт находится здесь →</a>
</div>

<main>{% block content %}{% endblock %}</main>
<footer>Демо-версия · только Flask · никакого JavaScript</footer>
</body>
</html>
